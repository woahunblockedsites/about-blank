<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --card: #141418;
    --border: #222228;
    --accent: #00ff99;
    --accent2: #ff3060;
    --accent3: #ffe600;
    --text: #f0f0f5;
    --muted: #55555f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* CATEGORY FILTERS */
  #filters {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: #444; }
  .filter-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

  /* GAME LIST */
  #game-list {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .game-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }

  .game-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
    border-radius: 0 2px 2px 0;
  }

  .game-row:hover {
    border-color: #333;
    background: #1a1a1f;
    transform: translateX(3px);
  }

  .game-row:hover::before { transform: scaleY(1); }

  .game-emoji {
    font-size: 26px;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }

  .game-info { flex: 1; min-width: 0; }

  .game-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .tag-io      { background: #0a2e20; color: var(--accent); }
  .tag-action  { background: #2e0a18; color: var(--accent2); }
  .tag-racing  { background: #2e2600; color: var(--accent3); }

  .launch-arrow {
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    transition: color 0.15s, transform 0.15s;
  }

  .game-row:hover .launch-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* LOADING OVERLAY */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,14,0.85);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 12px;
  }

  #loading.show { display: flex; }

  #loading p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>WOAH GAMES</h1>
  <p>click a game — opens in new tab</p>
</header>

<div id="filters">
  <button class="filter-btn active" onclick="filterGames('all')">All</button>
  <button class="filter-btn" onclick="filterGames('io')">IO</button>
  <button class="filter-btn" onclick="filterGames('action')">Action</button>
  <button class="filter-btn" onclick="filterGames('racing')">Racing</button>
</div>

<div id="game-list"></div>

<div id="loading"><p>LAUNCHING...</p></div>

<footer>woahunblockedsites</footer>

<script>
const games = [
  {
    name: "Slither.io",
    desc: "Eat pellets, grow your snake, eliminate others",
    emoji: "🐍",
    tag: "io",
    url: "https://slither.io"
  },
  {
    name: "Agar.io",
    desc: "Eat smaller cells and become the biggest blob",
    emoji: "🟢",
    tag: "io",
    url: "https://agar.io"
  },
  {
    name: "Diep.io",
    desc: "Tank shooter — destroy shapes and upgrade your tank",
    emoji: "🔵",
    tag: "io",
    url: "https://diep.io"
  },
  {
    name: "Krunker.io",
    desc: "Fast-paced first person shooter, browser native",
    emoji: "🎯",
    tag: "action",
    url: "https://krunker.io"
  },
  {
    name: "Shell Shockers",
    desc: "Egg FPS shooter — scramble your enemies",
    emoji: "🥚",
    tag: "action",
    url: "https://shellshock.io"
  },
  {
    name: "1v1.lol",
    desc: "Build and battle — fast Fortnite-style fights",
    emoji: "🏗️",
    tag: "action",
    url: "https://1v1.lol"
  },
  {
    name: "Moto X3M",
    desc: "Stunt bike racing through insane obstacle courses",
    emoji: "🏍️",
    tag: "racing",
    url: "https://www.y8.com/embed/moto_x3m"
  },
  {
    name: "Road Rush Cars",
    desc: "Dodge traffic at high speed",
    emoji: "🚗",
    tag: "racing",
    url: "https://www.y8.com/embed/road_rush_cars"
  },
  {
    name: "Smash Karts",
    desc: "Multiplayer kart battle arena",
    emoji: "🏎️",
    tag: "racing",
    url: "https://smashkarts.io"
  }
];

let currentFilter = 'all';

function filterGames(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderGames();
}

function renderGames() {
  const list = document.getElementById('game-list');
  const filtered = currentFilter === 'all' ? games : games.filter(g => g.tag === currentFilter);
  list.innerHTML = filtered.map((g, i) => `
    <div class="game-row" onclick="launchGame('${g.url}', '${g.name}')" style="animation-delay:${i*40}ms">
      <div class="game-emoji">${g.emoji}</div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-desc">${g.desc}</div>
      </div>
      <span class="tag tag-${g.tag}">${g.tag}</span>
      <span class="launch-arrow">→</span>
    </div>
  `).join('');
}

function launchGame(url, name) {
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now())
    .then(r => r.text())
    .then(html => {
      loading.classList.remove('show');
      const win = window.open("about:blank", "_blank");
      if (win) {
        win.document.open();
        win.document.write(html);
        win.document.close();
      }
    })
    .catch(() => {
      // fallback: just open the URL directly
      loading.classList.remove('show');
      window.open(url, "_blank");
    });
}

renderGames();
</script>
</body>
</html>
