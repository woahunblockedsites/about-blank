<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --card: #141418;
    --border: #222228;
    --accent: #00ff99;
    --accent2: #ff3060;
    --accent3: #ffe600;
    --text: #f0f0f5;
    --muted: #55555f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  #filters {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: #444; }
  .filter-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

  #game-list {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .game-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .game-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
    border-radius: 0 2px 2px 0;
  }

  .game-row:hover {
    border-color: #333;
    background: #1a1a1f;
    transform: translateX(3px);
  }

  .game-row:hover::before { transform: scaleY(1); }

  .game-emoji {
    font-size: 26px;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }

  .game-info { flex: 1; min-width: 0; }

  .game-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .tag-action  { background: #2e0a18; color: var(--accent2); }
  .tag-casual  { background: #0a2e20; color: var(--accent); }
  .tag-arcade  { background: #2e2600; color: var(--accent3); }

  .launch-arrow {
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    transition: color 0.15s, transform 0.15s;
  }

  .game-row:hover .launch-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,14,0.85);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 12px;
  }

  #loading.show { display: flex; }

  #loading p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  #custom-url-section {
    max-width: 680px;
    margin: 24px auto 0;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
  }

  #url-row {
    display: flex;
    gap: 8px;
  }

  #custom-url {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #custom-url:focus { border-color: var(--accent); }
  #custom-url::placeholder { color: var(--muted); }

  #url-launch-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 13px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  #url-launch-btn:hover {
    background: #00cc80;
    transform: scale(1.05);
  }

  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>WOAH GAMES</h1>
  <p>click a game — opens in new tab</p>
</header>

<div id="filters">
  <button class="filter-btn active" onclick="filterGames('all', event)">All</button>
  <button class="filter-btn" onclick="filterGames('action', event)">Action</button>
  <button class="filter-btn" onclick="filterGames('casual', event)">Casual</button>
  <button class="filter-btn" onclick="filterGames('arcade', event)">Arcade</button>
</div>

<div id="game-list"></div>

<div id="custom-url-section">
  <p class="section-label">or paste any jsDelivr / hosted HTML URL</p>
  <div id="url-row">
    <input id="custom-url" type="text" placeholder="https://cdn.jsdelivr.net/gh/..." spellcheck="false" />
    <button id="url-launch-btn" onclick="launchCustom()">→</button>
  </div>
</div>

<div id="loading"><p>LAUNCHING...</p></div>

<footer>woahunblockedsites</footer>

<script>
const CDN = "https://cdn.jsdelivr.net/gh/beak2825/one-file-games@main/";

const games = [
  {
    name: "Slope",
    desc: "Dodge obstacles at insane speed on a neon slope",
    emoji: "🎿",
    tag: "arcade",
    file: "slope.html"
  },
  {
    name: "Time Shooter 3",
    desc: "Time only moves when you move — stylish slow-mo FPS",
    emoji: "🔫",
    tag: "action",
    file: "timeshooter3.html"
  },
  {
    name: "Tomb of the Mask",
    desc: "Infinite arcade maze climber, swipe to move",
    emoji: "🎭",
    tag: "arcade",
    file: "tombofthemask.html"
  },
  {
    name: "Mario vs Luigi",
    desc: "Classic 2-player Mario battle",
    emoji: "🍄",
    tag: "casual",
    file: "mariovsluigi.html"
  },
  {
    name: "Block Eat Block",
    desc: "Eat smaller blocks, avoid bigger ones",
    emoji: "🟦",
    tag: "casual",
    file: "blockeatblock.html"
  },
  {
    name: "Eaglercraft",
    desc: "Minecraft in your browser — fully playable",
    emoji: "⛏️",
    tag: "casual",
    file: "eaglercraft.html"
  }
];

let currentFilter = 'all';

function filterGames(cat, e) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (e) e.target.classList.add('active');
  renderGames();
}

function renderGames() {
  const list = document.getElementById('game-list');
  const filtered = currentFilter === 'all' ? games : games.filter(g => g.tag === currentFilter);
  list.innerHTML = filtered.map((g, i) => `
    <div class="game-row" onclick="launchGame('${CDN + g.file}')" style="animation-delay:${i*40}ms">
      <div class="game-emoji">${g.emoji}</div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-desc">${g.desc}</div>
      </div>
      <span class="tag tag-${g.tag}">${g.tag}</span>
      <span class="launch-arrow">→</span>
    </div>
  `).join('');
}

function launchGame(url) {
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  fetch(url + '?t=' + Date.now())
    .then(r => r.text())
    .then(html => {
      loading.classList.remove('show');
      const win = window.open("about:blank", "_blank");
      if (win) {
        win.document.open();
        win.document.write(html);
        win.document.close();
      }
    })
    .catch(() => {
      loading.classList.remove('show');
      window.open(url, "_blank");
    });
}

function launchCustom() {
  let url = document.getElementById('custom-url').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  launchGame(url);
}

document.getElementById('custom-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') launchCustom();
});

renderGames();
</script>
</body>
</html>
